<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoginPage</title>
    <link rel="stylesheet" href="styleLogin.css">
</head>
<body>
    <div class="contenedor">
        <div class="contenedor-form">
            <form class="sing-in">
                <h2>Iniciar Sesión</h2>
                <span>Utilice sus credenciales</span>  <!-- de aqui pa abajo es la seccion del contenedor de entrada-->
                <div class="contenedor-input">
                   
                    <input type="email" placeholder="Nombre de usuario">
                </div>
                <div class="contenedor-input">
                    <input type="email" placeholder="Correo electrónico">
                </div>
                <div class="contenedor-input2">
                    
                    <input type="password" placeholder="Contraseña">
                </div>
                <button class="btn">Iniciar Sesión</button>
                <a href="#">¿Olvidaste tu contraseña?</a>
            </form>
        </div>
        <div class="contenedor-form"> <!-- aqui se encuentra el formulario de registro-->
            <form class="sing-up">
                <h2>Registrarse</h2>
                <span>Utilice su Correo</span>  <!-- de aqui pa abajo es la seccion del contenedor de entrada-->
               
                <div class="contenedor-input">
                    
                    <input type="email" placeholder="Correo electrónico">
                </div>
                <div class="contenedor-input2">
                    
                    <input type="password" placeholder="Contraseña">
                    
                </div>
               
                 <button class="btn">Registrarse</button>
            </form>
        </div>
    </div>
</body>

</html>
